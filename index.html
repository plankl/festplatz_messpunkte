<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festplatz Messpunkte</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Festplatz Messpunkte</h1>
    <div id="controls">
      <label for="layer-select">Karte:</label>
      <select id="layer-select">
        <option value="satellite">Satellit</option>
        <option value="street">Straße</option>
        <option value="topo">Topografisch</option>
      </select>
      <span id="count"></span>
    </div>
  </header>

  <div id="map"></div>

  <script src="app.js"></script>
</body>
</html>

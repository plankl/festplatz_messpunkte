<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Festplatz Messpunkte</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Festplatz Messpunkte</h1>
    <div id="controls">
      <label for="layer-select">Karte:</label>
      <select id="layer-select">
        <option value="satellite">Satellit (HD)</option>
        <option value="satellite_labels">Satellit + Labels</option>
        <option value="street">Straße (Dark)</option>
        <option value="topo">Topografisch</option>
        <option value="osm">OpenStreetMap</option>
      </select>
      <button id="btn-auswertung" title="Auswertung anzeigen">📊 Auswertung</button>
      <span id="count"></span>
    </div>
  </header>

  <div id="map"></div>

  <!-- Auswertung Panel -->
  <div id="auswertung" class="panel hidden">
    <div class="panel-header">
      <h2>Auswertung Messpunkte</h2>
      <button id="btn-close-panel">&times;</button>
    </div>
    <div id="auswertung-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
